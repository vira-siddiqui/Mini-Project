    <div class="radio-btn-light">

    <!-- Start Preloader 
    ============================================= -->
    <div id="preloader">
        <div id="agrica-preloader" class="agrica-preloader">
            <div class="animation-preloader">
                <div class="spinner"></div>
            </div>
            <div class="loader">
                <div class="row">
                    <div class="col-3 loader-section section-left">
                        <div class="bg"></div>
                    </div>
                    <div class="col-3 loader-section section-left">
                        <div class="bg"></div>
                    </div>
                    <div class="col-3 loader-section section-right">
                        <div class="bg"></div>
                    </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- End Preloader -->


    <!-- Start Login 
    ============================================= -->
    <div class="login-area">
        <div class="container">
            <div class="login-items">
                <div class="row">
                    <div class="col-lg-6">
                        <div class="login-thumb">
                            <img src="img/banner/7.jpg" alt="Image Not Found">
                            <div class="logo">
                                <a href="main.html"><img src="img/logo-light-2.png" alt="Image Not Found"></a>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="login-forms">
                            <h2>Create an account</h2>
                            <p>
                                Enter your details ato create a new account
                            </p>
                            <form action="#">
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group">
                                            <input class="form-control" placeholder="Email*" type="email">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group">
                                            <input class="form-control" placeholder="Password*" type="text">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group">
                                            <input class="form-control" placeholder="Password*" type="text">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-lg-12">
                                        <button type="submit">
                                            Register
                                        </button>
                                    </div>
                                </div>
                            </form>
                            <div class="login-alternative">
                                <h4>Or Register With</h4>
                                <ul>
                                    <li>
                                        <a href="#"><i class="fab fa-google"></i> Google</a>
                                    </li>
                                    <li>
                                        <a href="#"><i class="fab fa-facebook-f"></i> Facebook</a>
                                    </li>
                                </ul>
                                <p>
                                    Already have an account? <a href="login.html">Login Now</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
